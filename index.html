<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GorillaTag Metadata Helper — Slim + QoL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#071027;--panel:#091322;--muted:#9aa6bf;--accent:#34d399}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#031021,#051026);color:#e6eef8}
  .wrap{max-width:980px;margin:18px auto;padding:16px;border-radius:10px;background:rgba(255,255,255,0.02)}
  header{display:flex;align-items:center;gap:12px}
  h1{margin:0;font-size:18px}
  .muted{color:var(--muted);font-size:13px}
  .grid{display:grid;grid-template-columns:320px 1fr;gap:12px;margin-top:12px}
  .panel{background:var(--panel);padding:12px;border-radius:10px}
  .list{height:420px;overflow:auto;border-radius:8px;border:1px solid rgba(255,255,255,0.03);padding:8px;background:rgba(255,255,255,0.01)}
  .seg{padding:8px;border-radius:6px;margin-bottom:6px;cursor:pointer}
  .seg.sel{outline:2px solid rgba(52,211,153,0.12);background:linear-gradient(90deg, rgba(52,211,153,0.03), rgba(96,165,250,0.01))}
  textarea,input,button{font:inherit}
  textarea{width:100%;height:180px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:inherit;padding:8px;font-family:monospace}
  .btn{padding:8px 12px;border-radius:8px;border:none;background:linear-gradient(180deg,var(--accent),#60a5fa);color:#042233;font-weight:600;cursor:pointer}
  .btn.alt{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
  .row{display:flex;gap:8px;align-items:center}
  .search{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:inherit}
  .small{font-size:13px;color:var(--muted)}
  .preview{white-space:pre-wrap;background:rgba(255,255,255,0.01);padding:8px;border-radius:8px;margin-top:8px;font-family:monospace;max-height:220px;overflow:auto}
  @media (max-width:900px){ .grid{grid-template-columns:1fr} .list{height:260px} }
</style>
</head>
<body>
<div class="wrap">
<header>
  <div>
    <h1>GorillaTag Metadata Helper</h1>
    <div class="muted">Lightweight editor for GorillaTag-style metadata strings</div>
  </div>
</header>

<div class="grid">
  <div class="panel">
    <div class="row" style="margin-bottom:8px">
      <label class="btn alt">📁 Load<input id="fileInput" type="file" hidden></label>
      <button id="btnRescan" class="btn alt">Rescan</button>
      <div id="fileInfo" class="small" style="margin-left:auto">No file</div>
    </div>
    <input id="segSearch" class="search" placeholder="search text or 0xoffset" />
    <div id="segList" class="list"></div>
  </div>

  <div class="panel">
    <div class="small">Selected:</div>
    <div id="selInfo" style="font-family:monospace">(none)</div>
    <textarea id="editArea" placeholder="Select a string to edit"></textarea>
    <div class="row" style="margin-top:8px">
      <button id="btnApply" class="btn">Apply</button>
      <button id="btnDownload" class="btn">Download</button>
      <button id="btnRevert" class="btn alt">Revert</button>
    </div>
    <div id="fullPreview" class="preview">—</div>
  </div>
</div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const segList = document.getElementById('segList');
const segSearch = document.getElementById('segSearch');
const editArea = document.getElementById('editArea');
const selInfo = document.getElementById('selInfo');
const fullPreview = document.getElementById('fullPreview');
const btnApply = document.getElementById('btnApply');
const btnDownload = document.getElementById('btnDownload');
const btnRevert = document.getElementById('btnRevert');
const btnRescan = document.getElementById('btnRescan');

let originalBuffer = null;
let fileBuffer = null;
let segments = [];
let current = null;

function isPrintable(b){ return b >= 32 && b <= 126; }
function decodeAscii(bytes){ return new TextDecoder('latin1').decode(bytes); }
function encodeAsciiStr(s){ const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++) a[i]=s.charCodeAt(i)&0xFF; return a; }

fileInput.addEventListener('change', e=>{ const f=e.target.files[0]; if(f) loadFile(f); });

function loadFile(file){
  fileInfo.textContent = `Loaded: ${file.name}`;
  file.arrayBuffer().then(ab=>{
    originalBuffer = ab.slice(0);
    fileBuffer = new Uint8Array(ab.slice(0));
    scan();
  });
}

function scan(){
  segments = [];
  if(!fileBuffer) return;
  const u8=fileBuffer; let i=0;
  while(i<u8.length){
    if(isPrintable(u8[i])){
      const start=i; while(i<u8.length && isPrintable(u8[i])) i++;
      const len=i-start; if(len>=4){
        segments.push({offset:start,length:len,text:decodeAscii(u8.slice(start,start+len))});
      }
    } else i++;
  }
  render();
}

function render(){
  segList.innerHTML='';
  const q=segSearch.value.toLowerCase();
  for(const s of segments){
    if(q && !s.text.toLowerCase().includes(q) && !('0x'+s.offset.toString(16)).includes(q)) continue;
    const el=document.createElement('div'); el.className='seg';
    el.textContent=`0x${s.offset.toString(16)} (${s.length})  ${s.text.slice(0,80)}`;
    el.onclick=()=>select(s,el);
    segList.appendChild(el);
  }
}

function select(s,el){
  document.querySelectorAll('.seg').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  current=s;
  selInfo.textContent=`0x${s.offset.toString(16)} • ${s.length}`;
  editArea.value=s.text;
  fullPreview.textContent=s.text;
}

btnApply.onclick=()=>{
  if(!current) return;
  const b=encodeAsciiStr(editArea.value);
  fileBuffer.set(b,current.offset);
  current.text=decodeAscii(fileBuffer.slice(current.offset,current.offset+current.length));
  fullPreview.textContent=current.text;
  render();
};

btnDownload.onclick=()=>{
  if(!fileBuffer) return;
  const blob=new Blob([fileBuffer]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='global-metadata.dat';
  a.click();
};

btnRevert.onclick=()=>{
  if(!originalBuffer) return;
  fileBuffer=new Uint8Array(originalBuffer.slice(0));
  scan();
};

btnRescan.onclick=scan;
segSearch.oninput=render;
</script>
</body>
</html>
